basePath: /api/v1
definitions:
  handler.ErrorResponse:
    properties:
      error:
        example: 'failed to run nmap scan: ...'
        type: string
    type: object
  handler.ScanRequest:
    properties:
      ports:
        example:
        - "80"
        - "443"
        items:
          type: string
        type: array
      targets:
        example:
        - 127.0.0.1
        - scanme.nmap.org
        items:
          type: string
        type: array
    required:
    - ports
    - targets
    type: object
host: localhost:8082
info:
  contact: {}
  description: REST API service to execute Nmap scans and return XML results.
  license:
    name: MIT
    url: https://github.com/gpy/nmapshot/blob/main/LICENSE
  title: Nmap Shot API
  version: "1.0"
paths:
  /scan:
    post:
      consumes:
      - application/json
      description: Execute an nmap scan on specified targets and ports, returning
        raw Nmap XML output. Ports must be within the server-configured allowed range.
      parameters:
      - description: Scan Parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ScanRequest'
      produces:
      - text/xml
      responses:
        "200":
          description: Nmap XML output
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Run Nmap Scan
      tags:
      - scan
schemes:
- http
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
